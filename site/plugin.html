<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugin — IITC Community Plugins Observer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <a id="back-link" href="/" class="back-link">← All Plugins</a>
    <h1 id="plugin-name">Loading…</h1>
    <p id="plugin-meta" class="subtitle"></p>
  </header>

  <main>
    <section id="plugin-info">
      <dl id="plugin-details"></dl>
    </section>

    <section id="versions-section">
      <div class="versions-toolbar">
        <h2>Version History</h2>
        <button id="compare-btn" disabled>Compare selected (pick 2)</button>
      </div>
      <table id="versions-table">
        <thead>
          <tr>
            <th></th>
            <th>Version</th>
            <th>Date</th>
            <th>SHA-256</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="versions-tbody">
          <tr><td colspan="5" class="loading">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>Data sourced from <a href="https://github.com/IITC-CE/Community-plugins">IITC-CE/Community-plugins</a></p>
  </footer>

  <script type="module" src="/js/plugin.js"></script>
</body>
</html>
